name: Manuscript build

on:
  pull_request:
    paths:
      - "manuscript/**"
      - "scripts/render_paper_b_figures.py"
      - "scripts/analyze_paper_b_reviewer_robustness.py"
      - "scripts/analyze_paper_b_posterior_bridge.py"
      - "scripts/paper_b_benchmark_core.py"
      - "scripts/simulate_paper_b_benchmark.py"
      - ".github/workflows/manuscript-build.yml"
  push:
    branches: [main]
    paths:
      - "manuscript/**"
      - "scripts/render_paper_b_figures.py"
      - "scripts/analyze_paper_b_reviewer_robustness.py"
      - "scripts/analyze_paper_b_posterior_bridge.py"
      - "scripts/paper_b_benchmark_core.py"
      - "scripts/simulate_paper_b_benchmark.py"
      - ".github/workflows/manuscript-build.yml"
  workflow_dispatch:

jobs:
  build-paper-b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate validated benchmark figures and compiled source
        run: python scripts/render_paper_b_figures.py
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-pictures
      - name: Compile Paper B with generated figures
        working-directory: manuscript
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error paper_b_compiled.tex
      - name: Upload manuscript PDF, log, source, and generated figures
        uses: actions/upload-artifact@v4
        with:
          name: paper-b-manuscript
          path: |
            manuscript/paper_b_compiled.pdf
            manuscript/paper_b_compiled.log
            manuscript/paper_b_compiled.tex
            manuscript/generated/paper_b_experiment_contrast.tex
            manuscript/generated/paper_b_strategy_outcomes.tex
            manuscript/generated/paper_b_target_switch.tex
            manuscript/generated/paper_b_threshold_sensitivity.tex
            manuscript/generated/paper_b_posterior_bridge_table.tex
            artifacts/paper_b_reviewer_robustness.json
            artifacts/paper_b_posterior_bridge.json
