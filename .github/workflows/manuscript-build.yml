name: Manuscript build

on:
  pull_request:
    paths:
      - "manuscript/**"
      - ".github/workflows/manuscript-build.yml"
  push:
    branches: [main]
    paths:
      - "manuscript/**"
      - ".github/workflows/manuscript-build.yml"
  workflow_dispatch:

jobs:
  build-paper-b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra
      - name: Compile Paper B
        working-directory: manuscript
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error paper_b_main.tex
      - name: Upload manuscript PDF and log
        uses: actions/upload-artifact@v4
        with:
          name: paper-b-manuscript
          path: |
            manuscript/paper_b_main.pdf
            manuscript/paper_b_main.log
