name: CED reproducibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-replay:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and tests
        run: python -m pip install -e '.[dev]'
      - name: Run CED theorem tests
        run: pytest
      - name: Write deterministic replay reports
        if: matrix.python-version == '3.12'
        run: |
          python scripts/verify_ced_core.py
          python scripts/verify_imperfect_detection.py
          python scripts/verify_mode_detection.py
          python scripts/verify_threshold_detection.py
          python scripts/verify_multiple_testing.py
          python scripts/verify_calibration_bounds.py
          python scripts/verify_discovery_budget.py
          python scripts/verify_dependent_repeats.py
          python scripts/verify_heterogeneous_thresholds.py
          python scripts/verify_adaptive_spending.py
          python scripts/verify_overlapping_modes.py
          python scripts/verify_discovery_concentration.py
          python scripts/verify_experiment_quotient.py
          python scripts/verify_target_resolution.py
          python scripts/verify_failure_target_comparison.py
          python scripts/simulate_paper_b_benchmark.py
          python scripts/analyze_paper_b_reviewer_robustness.py
          python scripts/analyze_paper_b_posterior_bridge.py
      - name: Upload replay artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: ced-reproducibility
          path: |
            artifacts/ced_core_report.json
            artifacts/ced_imperfect_detection_report.json
            artifacts/ced_mode_detection_report.json
            artifacts/ced_threshold_detection_report.json
            artifacts/ced_multiple_testing_report.json
            artifacts/ced_calibration_bounds_report.json
            artifacts/ced_discovery_budget_report.json
            artifacts/ced_dependent_repeats_report.json
            artifacts/ced_heterogeneous_thresholds_report.json
            artifacts/ced_adaptive_spending_report.json
            artifacts/ced_overlapping_modes_report.json
            artifacts/ced_discovery_concentration_report.json
            artifacts/ced_experiment_quotient_report.json
            artifacts/ced_target_resolution_report.json
            artifacts/ced_failure_target_comparison_report.json
            artifacts/paper_b_simulation_summary.json
            artifacts/paper_b_simulation_grid.csv
            artifacts/paper_b_simulation_table.tex
            artifacts/paper_b_reviewer_robustness.json
            artifacts/paper_b_posterior_bridge.json
